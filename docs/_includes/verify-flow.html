<svg viewBox="0 0 760 280" xmlns="http://www.w3.org/2000/svg" class="verify-svg" role="img" aria-label="Verification flow: commit, build, run, prove">
  <defs>
    <linearGradient id="verifyBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161a23"/>
      <stop offset="100%" stop-color="#11141b"/>
    </linearGradient>
    <marker id="verifyHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#ff9900"/>
    </marker>
  </defs>

  <!-- connecting line -->
  <line x1="100" y1="140" x2="660" y2="140" stroke="#313a52" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- step 1: commit -->
  <g>
    <circle cx="100" cy="140" r="32" fill="url(#verifyBox)" stroke="#313a52" stroke-width="1.5"/>
    <g transform="translate(82 122)">
      <circle cx="6" cy="6"  r="4" fill="none" stroke="#ff9900" stroke-width="1.4"/>
      <circle cx="6" cy="30" r="4" fill="none" stroke="#ff9900" stroke-width="1.4"/>
      <circle cx="30" cy="18" r="4" fill="none" stroke="#ff9900" stroke-width="1.4"/>
      <line x1="6" y1="10" x2="6" y2="26" stroke="#ff9900" stroke-width="1.4"/>
      <line x1="9" y1="10" x2="27" y2="16" stroke="#ff9900" stroke-width="1.4"/>
      <line x1="9" y1="26" x2="27" y2="20" stroke="#ff9900" stroke-width="1.4"/>
    </g>
    <text x="100" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e6e9f2">Commit</text>
    <text x="100" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#97a0b8">git push to master</text>
  </g>

  <!-- step 2: GitHub Actions build -->
  <g>
    <circle cx="240" cy="140" r="32" fill="url(#verifyBox)" stroke="#313a52" stroke-width="1.5"/>
    <g transform="translate(218 118)" stroke="#ff9900" stroke-width="1.6" fill="none">
      <rect x="0" y="6" width="44" height="38" rx="3"/>
      <line x1="0" y1="14" x2="44" y2="14"/>
      <circle cx="6" cy="10" r="1" fill="#ff9900"/>
      <circle cx="11" cy="10" r="1" fill="#ff9900"/>
      <line x1="6" y1="22" x2="38" y2="22"/>
      <line x1="6" y1="30" x2="34" y2="30"/>
      <line x1="6" y1="38" x2="40" y2="38"/>
    </g>
    <text x="240" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e6e9f2">CI build</text>
    <text x="240" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#97a0b8">build-riscv64.yml</text>
  </g>

  <!-- step 3: zk-testing run -->
  <g>
    <circle cx="380" cy="140" r="32" fill="url(#verifyBox)" stroke="#313a52" stroke-width="1.5"/>
    <g transform="translate(360 122)">
      <rect x="0" y="0" width="40" height="36" rx="3" fill="none" stroke="#ff9900" stroke-width="1.4"/>
      <line x1="6" y1="8" x2="34" y2="8" stroke="#ff9900" stroke-width="1.2"/>
      <line x1="6" y1="14" x2="28" y2="14" stroke="#ff9900" stroke-width="1.2"/>
      <line x1="6" y1="20" x2="32" y2="20" stroke="#ff9900" stroke-width="1.2"/>
      <path d="M6 28 L12 32 L20 24" fill="none" stroke="#4ade80" stroke-width="1.6"/>
    </g>
    <text x="380" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e6e9f2">Tests run</text>
    <text x="380" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#97a0b8">samples + StatelessExec</text>
  </g>

  <!-- step 4: zkVM prove — distinct cyan to mark "this is the proof step" -->
  <g>
    <circle cx="520" cy="140" r="32" fill="url(#verifyBox)" stroke="#00b3ff" stroke-width="1.5"/>
    <g transform="translate(498 118)">
      <rect x="0" y="0" width="44" height="44" rx="6" fill="none" stroke="#00b3ff" stroke-width="1.4"/>
      <text x="22" y="28" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#00b3ff">π</text>
    </g>
    <text x="520" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e6e9f2">Zisk proof</text>
    <text x="520" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#97a0b8">deterministic, replayable</text>
  </g>

  <!-- step 5: dashboard -->
  <g>
    <circle cx="660" cy="140" r="32" fill="url(#verifyBox)" stroke="#ff9900" stroke-width="1.5"/>
    <g transform="translate(640 122)">
      <rect x="0" y="0" width="40" height="36" rx="3" fill="none" stroke="#ff9900" stroke-width="1.4"/>
      <rect x="6" y="22" width="6" height="10" fill="#ff9900"/>
      <rect x="16" y="14" width="6" height="18" fill="#ff9900" opacity="0.7"/>
      <rect x="26" y="6" width="6" height="26" fill="#ff9900" opacity="0.5"/>
    </g>
    <text x="660" y="200" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#e6e9f2">Dashboard</text>
    <text x="660" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#97a0b8">zk-testing.nethermind.dev</text>
  </g>

  <!-- arrows -->
  <g stroke="#ff9900" stroke-width="1.6" fill="none" marker-end="url(#verifyHead)">
    <line x1="135" y1="140" x2="200" y2="140"/>
    <line x1="275" y1="140" x2="340" y2="140"/>
    <line x1="415" y1="140" x2="480" y2="140"/>
    <line x1="555" y1="140" x2="620" y2="140"/>
  </g>

  <!-- title -->
  <text x="380" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" letter-spacing="0.14em" fill="#ff9900">CONTINUOUS VERIFICATION</text>
  <text x="380" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#97a0b8">Every commit walks the full pipeline — code, build, run, prove.</text>
</svg>
